output_contract:
  event_type: analysis_result
  per_combination_result: true
  writeback_target: Jack/storage
  required_fields:
    - symbol
    - strategy
    - frame
    - conclusion
    - observed_at
    - status
    - result_code
    - confidence

formula:
  results_per_ticker: timeframes_count * active_strategies_count
